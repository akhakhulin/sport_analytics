name: Keep Streamlit Awake

# Пингаем Streamlit Community Cloud каждые 8 часов, чтобы приложение
# не уходило в "Zzzz" из-за бездействия (free tier усыпляет после ~12ч).
#
# Если Streamlit задетектит бот-трафик и всё равно усыпит — переходим
# на самохостинг VPS (см. план).

on:
  schedule:
    # Каждые 3 часа (раньше было 8 — иногда не успевал, free tier
    # засыпает быстрее чем ожидаемые 12ч).
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  APP_URL: 'https://sport-analytics.streamlit.app/'

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake app (без падения на 503)
        # Стратегия — НЕ падать workflow даже если health не вернул 200.
        # Streamlit просыпается 60-120 сек, поэтому второй пинг через
        # 90 сек делает запрос на main page (это нагляднее для счётчика
        # «реальной активности» чем health endpoint).
        # User-Agent — реальный браузерный без слова Bot (раньше Streamlit
        # отказывался считать ботов «активностью»).
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          HEALTH="${APP_URL%/}/_stcore/health"

          echo "=== 1st health (wake-up trigger) ==="
          curl -sSL --max-time 60 -A "$UA" "$HEALTH" -o /dev/null \
            -w "  HTTP %{http_code}  time=%{time_total}s\n" || true

          echo
          echo "=== Sleep 90s for wake-up ==="
          sleep 90

          echo "=== 2nd hit on main page (real traffic для counter) ==="
          curl -sSL --max-time 90 -A "$UA" "$APP_URL" -o /dev/null \
            -w "  HTTP %{http_code}  time=%{time_total}s\n" || true

          echo
          echo "=== 3rd health (final check, не fail) ==="
          status=$(curl -sSL --max-time 30 -A "$UA" "$HEALTH" \
            -o /dev/null -w "%{http_code}" || echo "000")
          echo "  HTTP $status"
          if [ "$status" = "200" ]; then
            echo "✅ App awake at $(date -u)"
          else
            # Не валим — Streamlit мог не успеть проснуться, но факт
            # запроса засчитан как активность и поможет в след. раз.
            echo "⚠️  App ещё не до конца проснулся (status=$status), но активность зафиксирована."
          fi
