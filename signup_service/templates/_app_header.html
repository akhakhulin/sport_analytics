<!-- App header — для залогиненных страниц (done, onboarding/connect, settings).
     НЕ подключается на auth-страницах (signup/login) — там лого внутри карточки. -->
<header class="app-header" role="banner">
  <a href="/done" class="app-header-brand" aria-label="BeatMetrics — на главную">
    <svg viewBox="0 0 64 64" width="28" height="28" aria-hidden="true">
      <rect width="64" height="64" rx="14" fill="#3c3489"/>
      <path d="M 14 12 L 14 52" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <path d="M 14 30 Q 14 20 26 20 Q 38 20 38 36 Q 38 52 26 52 Q 14 52 14 42" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 44 36 L 46 36 L 48 31 L 51 41 L 53 36 L 55 36" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="app-header-brand-name">BeatMetrics</span>
  </a>
  <div class="app-header-spacer"></div>
  {% if user %}
    <span class="app-header-user" title="{{ user.email }}">{{ user.name or user.email }}</span>
    <form method="post" action="/logout" class="app-header-logout-form">
      <button type="submit" class="app-header-logout" data-i18n="logout">Выйти</button>
    </form>
  {% endif %}
</header>
