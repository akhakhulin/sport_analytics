<!-- Eng/Rus pill-toggle + client-side i18n словарь.
     Подключается из base.html — работает на всех страницах app.beatmetrics.ru.
     Тексты переводятся через data-i18n="key" или data-i18n-placeholder="key". -->
<style>
.lang-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 200;
  display: inline-flex; align-items: center;
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--color-line);
  border-radius: 999px; padding: 3px;
  font-size: 12px; font-weight: 500;
  user-select: none;
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.lang-toggle button {
  border: none; background: transparent; cursor: pointer;
  padding: 5px 12px; border-radius: 999px;
  color: var(--color-mute); font: inherit;
  transition: background .15s ease, color .15s ease;
}
.lang-toggle button.active {
  background: var(--color-brand);
  color: #fff;
}
.lang-toggle button:hover:not(.active) { color: var(--color-ink); }
</style>

<div class="lang-toggle" role="radiogroup" aria-label="Language">
  <button type="button" data-lang="en" role="radio" aria-checked="false">Eng</button>
  <button type="button" data-lang="ru" role="radio" aria-checked="true" class="active">Rus</button>
</div>

      reset_token_err: 'Ссылка истекла или уже использована.',
      reset_request_new: 'Запросить новую ссылку →'
    }
  };

  var KEY = 'beatmetrics_lang';
  var stored = localStorage.getItem(KEY);
  var lang = (stored === 'en' || stored === 'ru') ? stored : 'ru';

  function applyLang(l) {
    lang = l;
    localStorage.setItem(KEY, l);
    document.documentElement.setAttribute('lang', l);
    var dict = DICT[l] || {};
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (dict[key] !== undefined) el.innerHTML = dict[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
      var key = el.getAttribute('data-i18n-placeholder');
      if (dict[key] !== undefined) el.setAttribute('placeholder', dict[key]);
    });
    document.querySelectorAll('.lang-toggle button').forEach(function (b) {
      var isActive = b.dataset.lang === l;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-checked', isActive ? 'true' : 'false');
    });
  }

  document.querySelectorAll('.lang-toggle button').forEach(function (b) {
    b.addEventListener('click', function () { applyLang(b.dataset.lang); });
  });
  applyLang(lang);
})();
</script>
