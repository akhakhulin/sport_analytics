/* Тумблер прикрепляется JS-ом к верхнему правому углу карточки
   (.auth-card / .done-card / .onb-card). Сами карточки получают
   position:relative для якоря. Если карточки нет на странице — fallback
   на fixed-top-right viewport. */
.lang-toggle {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  display: inline-flex; align-items: center;
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--color-line);
  border-radius: 999px; padding: 2px;
  font-size: 11px; font-weight: 500;
  user-select: none;
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.lang-toggle.lang-toggle-fixed {
  position: fixed; top: 16px; right: 16px; z-index: 200;
}
.lang-toggle button {
  border: none; background: transparent; cursor: pointer;
  padding: 4px 10px; border-radius: 999px;
  color: var(--color-mute); font: inherit;
  transition: background .15s ease, color .15s ease;
  min-width: 28px;
}
.lang-toggle button.active {
  background: var(--color-brand);
  color: #fff;
}
.lang-toggle button:hover:not(.active) { color: var(--color-ink); }
</style>

<div class="lang-toggle lang-toggle-fixed" role="radiogroup" aria-label="Language">
  <button type="button" data-lang="en" role="radio" aria-checked="false">En</button>

  // Иначе остаётся fixed в углу viewport (fallback).
  var toggleEl = document.querySelector('.lang-toggle');
  var card = document.querySelector('.auth-card, .done-card, .onb-card');
  if (toggleEl && card) {
    var cs = getComputedStyle(card);
    if (cs.position === 'static') card.style.position = 'relative';
    toggleEl.classList.remove('lang-toggle-fixed');
    card.appendChild(toggleEl);
  }

  var KEY = 'beatmetrics_lang';
  var stored = localStorage.getItem(KEY);
  var lang = (stored === 'en' || stored === 'ru') ? stored : 'ru';

  function applyLang(l) {
    lang = l;
    localStorage.setItem(KEY, l);
    document.documentElement.setAttribute('lang', l);
    var dict = DICT[l] || {};
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (dict[key] !== undefined) el.innerHTML = dict[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
      var key = el.getAttribute('data-i18n-placeholder');
      if (dict[key] !== undefined) el.setAttribute('placeholder', dict[key]);
    });
    document.querySelectorAll('[data-i18n-aria]').forEach(function (el) {
      var key = el.getAttribute('data-i18n-aria');
      if (dict[key] !== undefined) el.setAttribute('aria-label', dict[key]);
    });
    document.querySelectorAll('.lang-toggle button').forEach(function (b) {
      var isActive = b.dataset.lang === l;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-checked', isActive ? 'true' : 'false');
    });
  }

  document.querySelectorAll('.lang-toggle button').forEach(function (b) {
    b.addEventListener('click', function () { applyLang(b.dataset.lang); });
  });
  applyLang(lang);
})();
