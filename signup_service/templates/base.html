<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}BeatMetrics{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css?v=20260606b">
</head>
<body>
{% block body %}{% endblock %}
<footer class="app-foot">
  <a href="/terms" data-i18n="foot_terms">Условия</a> ·
  <a href="/privacy" data-i18n="foot_privacy">Конфиденциальность</a> ·
  <a href="mailto:support@beatmetrics.ru">support@beatmetrics.ru</a>
</footer>
{% include "_lang_toggle.html" %}
{% include "_cookie_banner.html" %}
<script>
// Глазик для всех input[type=password] внутри .field-password
(function () {
  document.querySelectorAll('.field-password').forEach(function (wrap) {
    var input = wrap.querySelector('input[type="password"]');
    if (!input || wrap.querySelector('.pw-toggle')) return;
    var btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'pw-toggle';
    btn.setAttribute('aria-label', 'Показать пароль');
    btn.innerHTML = '👁';
    btn.addEventListener('click', function () {
      var show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.innerHTML = show ? '🙈' : '👁';
      btn.setAttribute('aria-label', show ? 'Скрыть пароль' : 'Показать пароль');
    });
    wrap.appendChild(btn);
  });
})();
</script>
</body>
</html>
