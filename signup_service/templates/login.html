{% extends "base.html" %}
{% block title %}Войти · BeatMetrics{% endblock %}
{% block body %}
<main class="auth-shell">
  <div class="auth-card">
    <div class="logo-wrap">{% include "_logo.html" %}</div>
    <div class="tagline">тренируйся осознанно</div>

    <form method="post" action="/login" class="form" autocomplete="on" novalidate>
      {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autofocus
               autocomplete="email" value="{{ email_value or '' }}">
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" required
               autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top:4px">Войти</button>

      <div class="form-bottom">
        Нет аккаунта? <a href="/signup">Зарегистрироваться</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
