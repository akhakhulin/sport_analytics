# Скрывает встроенный тулбар Streamlit (Share / звезда / GitHub / "Manage app").
# Видно ТОЛЬКО владельцу приложения — обычные пользователи и так не видят.
# С minimal — скрыто и у владельца тоже, чище UX.

[client]
toolbarMode = "minimal"
showErrorDetails = false

[browser]
gatherUsageStats = false

# Включаем раздачу /app/static/* для CSS bg-фото на login-странице
[server]
enableStaticServing = true

# Тема под прототип Sportsmen Analytics
[theme]
primaryColor = "#185FA5"
backgroundColor = "#F5F4EF"
secondaryBackgroundColor = "#F5F4EF"
textColor = "#2C2C2A"
font = "sans serif"
base = "light"
