# Шаблон секретов.
#
# Локально:        скопируйте в .streamlit/secrets.toml (этот файл уже в .gitignore).
# Streamlit Cloud: вставьте содержимое в Settings → Secrets через UI.
#
# Пароли — bcrypt-хэши. Сгенерировать: `python make_password.py`.

[auth]
# Cookie-name влияет только на изоляцию вкладок в одном браузере.
cookie_name = "garmin_dashboard_auth"

# === Главный coach (вы как админ платформы) ===
# role=coach, без visible_athletes → видит дропдаун со ВСЕМИ атлетами в БД.
# athlete_id = ваш собственный — чтобы свои данные тоже было видно
# (выбираете себя в дропдауне как обычного атлета).
[auth.users.coach]
name = "Алексей"
password = "$2b$12$REPLACE_WITH_REAL_BCRYPT_HASH"
role = "coach"
athlete_id = "alex"

# === Ваш персональный тренер ===
# role=coach (чтобы был дропдаун), но visible_athletes ограничен — видит только вас.
# Не видит ни Машу, ни Ивана, ни других ваших атлетов.
[auth.users.my_trainer]
name = "Сергей (мой тренер)"
password = "$2b$12$REPLACE_WITH_REAL_BCRYPT_HASH"
role = "coach"
athlete_id = "alex"           # его «default» при входе
visible_athletes = ["alex"]   # список athlete_id, к которым у него есть доступ

# === Атлеты, которых тренируете вы ===
# role=athlete — каждый видит только свой athlete_id, без дропдауна.
[auth.users.ivan]
name = "Иван Петров"
password = "$2b$12$REPLACE_WITH_REAL_BCRYPT_HASH"
role = "athlete"
athlete_id = "ivan_petrov"

[auth.users.maria]
name = "Мария Иванова"
password = "$2b$12$REPLACE_WITH_REAL_BCRYPT_HASH"
role = "athlete"
athlete_id = "maria_ivanova"

# Облачная Turso БД, общая на всех (тренер + атлеты).
# При локальном запуске эти значения берутся из .env и сюда не нужны.
[turso]
url = "libsql://garmin-xxx.turso.io"
token = "eyJhbGc..."

# Опционально: кнопка "🔄 Обновить из БД" в сайдбаре дашборда дополнительно
# триггерит GitHub Actions workflow для cloud-атлетов (мгновенный sync).
# Без этой секции кнопка просто чистит кэш как раньше.
#
# Получить токен: https://github.com/settings/personal-access-tokens/new
#  - Repository access: only `sport_analytics`
#  - Permissions:       Actions = Read and write
[github]
token = "github_pat_..."
repo = "akhakhulin/sport_analytics"
workflow = "cloud_sync.yml"
ref = "main"
