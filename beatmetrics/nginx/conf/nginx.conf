worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # WebSocket support — Streamlit полагается на Upgrade/Connection заголовки
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # === HTTP (80) ===
    # 1) обслуживает ACME-challenge для Let's Encrypt
    # 2) редиректит на HTTPS всё остальное
    server {
        listen       80;
        server_name  beatmetrics.ru www.beatmetrics.ru app.beatmetrics.ru;

        # ACME http-01 challenge (win-acme положит сюда токен)
        location ^~ /.well-known/acme-challenge/ {
            root  C:/Claude_Projects/garmin_analytics/beatmetrics/nginx/html;
            try_files $uri =404;
        }

        # всё остальное — на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # === HTTPS (443) ===
    server {
        listen       443 ssl;
        http2 on;
        server_name  beatmetrics.ru www.beatmetrics.ru;

        ssl_certificate     C:/Claude_Projects/garmin_analytics/beatmetrics/certs/beatmetrics.ru-chain.pem;
        ssl_certificate_key C:/Claude_Projects/garmin_analytics/beatmetrics/certs/beatmetrics.ru-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;

        # === Landing на root ===
        location = / {
            root C:/Claude_Projects/garmin_analytics/beatmetrics/nginx/html;
            try_files /landing.html =404;
        }
        # Статика landing-страницы (фото, иконки)
        location /landing-assets/ {
            root C:/Claude_Projects/garmin_analytics/beatmetrics/nginx/html;
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # === Streamlit dashboard на /dashboard/ ===
        # WebSocket
        location /dashboard/_stcore/stream {
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
        # Сам dashboard (Streamlit запущен с --server.baseUrlPath=dashboard)
        location /dashboard/ {
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 86400;
        }
        # Без trailing slash — редирект на /dashboard/ (чтобы относительные пути работали)
        location = /dashboard {
            return 301 /dashboard/;
        }

        # 404 для любых других путей — не отдавать неавторизованным фейк-Streamlit
        location / {
            return 404;
        }
    }

    # === HTTPS (443) для app.beatmetrics.ru → FastAPI signup_service ===
    server {
        listen       443 ssl;
        http2 on;
        server_name  app.beatmetrics.ru;

        ssl_certificate     C:/Claude_Projects/garmin_analytics/beatmetrics/certs/beatmetrics.ru-chain.pem;
        ssl_certificate_key C:/Claude_Projects/garmin_analytics/beatmetrics/certs/beatmetrics.ru-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;

        # Защитные заголовки
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Всё проксируем в uvicorn signup-сервиса
        location / {
            proxy_pass http://127.0.0.1:8502;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }
    }
}
